<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Garage Darts</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Garage Darts">
<meta name="theme-color" content="#0d0d0d">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
:root{
  --bg:#0d0d0d;--bg2:#181818;--bg3:#242424;
  --border:#2a2a2a;--border2:#3a3a3a;
  --green:#C9A84C;--green-dk:#3d2e00;--green-mid:#7a6020;
  --red:#ef4444;--gold:#C9A84C;--blue:#3b82f6;
  --text:#f0f0f0;--muted:#666;
}
body.light{
  --bg:#f0f0f0;--bg2:#ffffff;--bg3:#e4e4e4;
  --border:#d0d0d0;--border2:#b8b8b8;
  --green:#8B6914;--green-dk:#f5e8c0;--green-mid:#a07820;
  --red:#dc2626;--gold:#8B6914;--blue:#2563eb;
  --text:#111111;--muted:#888;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;overflow:hidden;color-scheme:dark}
body.light{color-scheme:light}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.theme-toggle{position:absolute;top:max(10px,calc(env(safe-area-inset-top) + 4px));right:10px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;z-index:10}
.theme-toggle:active{opacity:.6}

/* HOME */
.s-home{display:flex;flex-direction:column;align-items:center;height:100%;gap:0;padding:clamp(8px,1.5vw,16px);padding-top:max(clamp(8px,1.5vw,16px),calc(env(safe-area-inset-top) + 8px));position:relative}
.home-logo{width:clamp(80px,13vmin,140px);height:clamp(80px,13vmin,140px);object-fit:contain;border-radius:50%;cursor:pointer;transition:transform .15s;border:3px solid transparent;margin-top:clamp(6px,1vh,16px);flex-shrink:0}
.home-logo:active{transform:scale(.91)}
.logo{font-family:'Teko',sans-serif;font-size:clamp(46px,8.5vw,96px);font-weight:700;color:var(--green);letter-spacing:3px;line-height:1;text-align:center;margin:clamp(4px,0.8vh,10px) 0;flex-shrink:0}
.logo-sub{display:none}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,1fr);gap:clamp(5px,1vw,12px);width:100%;max-width:min(98vw,800px);flex:1;min-height:0;margin-top:clamp(4px,0.8vh,10px)}
.mcard{background:var(--bg2);border:2px solid var(--border);border-radius:10px;padding:clamp(6px,1.2vh,14px) clamp(8px,1.5vw,18px);cursor:pointer;display:flex;flex-direction:column;justify-content:center;overflow:hidden;min-width:0}
.mcard:active{opacity:.65}
.mcard .mn{font-family:'Teko',sans-serif;font-size:clamp(22px,5vh,72px);font-weight:700;letter-spacing:.5px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcard .md{font-size:clamp(12px,1.8vw,20px);color:#999;margin-top:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcard.dj{border-color:var(--green-dk)}.mcard.dj .mn{color:var(--green)}
.mcard.dj{border-color:var(--green-dk)}.mcard.dj .mn{color:var(--gold)}
.mcard.gar{border-color:var(--green-dk)}.mcard.gar .mn{color:var(--gold)}
.mcard.cls{border-color:var(--green-dk)}.mcard.cls .mn{color:var(--gold)}
.mcard.x01{border-color:var(--green-dk)}.mcard.x01 .mn{color:var(--gold)}
.mcard.lb{border-color:var(--green-dk)}.mcard.lb .mn{color:var(--gold)}
body.light .mcard.dj,body.light .mcard.gar,body.light .mcard.cls,body.light .mcard.x01,body.light .mcard.lb{border-color:#8B6914}
body.light .mcard.dj .mn,body.light .mcard.gar .mn,body.light .mcard.cls .mn,body.light .mcard.x01 .mn,body.light .mcard.lb .mn{color:#7a5c10}

/* PLAYERS */
.s-players{display:flex;flex-direction:column;height:100%;padding:14px;gap:10px}
.stitle{font-family:'Teko',sans-serif;font-size:26px;font-weight:700;color:var(--green);letter-spacing:2px}
.plist{flex:1;display:flex;flex-direction:column;gap:7px;overflow-y:auto}
.prow{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:9px;padding:10px 12px;border:1px solid var(--border)}
.pnum{font-family:'Teko',sans-serif;font-size:22px;color:var(--green);min-width:22px}
.pinput{flex:1;background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:20px;padding:4px 0;outline:none}
.pinput:focus{border-color:var(--green)}
.rmv{background:none;border:none;color:var(--red);font-size:22px;cursor:pointer;padding:2px 8px}
.add-btn{background:var(--bg3);border:2px dashed var(--border);border-radius:9px;padding:10px;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.opts{background:var(--bg2);border-radius:9px;padding:10px 12px;border:1px solid var(--border)}
.opts-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.opt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.opt-row:last-child{margin-bottom:0}
.opt-label{font-size:15px}
.tog{position:relative;width:42px;height:23px;background:var(--bg3);border-radius:11px;cursor:pointer;border:1px solid var(--border);flex-shrink:0}
.tog.on{background:var(--gold);border-color:var(--gold)}
.tog::after{content:'';position:absolute;width:17px;height:17px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s}
.tog.on::after{left:21px}
.nav-row{display:flex;gap:8px}
.btn{border:none;border-radius:8px;font-family:'Teko',sans-serif;font-size:19px;font-weight:600;cursor:pointer;padding:11px 16px;letter-spacing:.5px}
.btn:active{opacity:.6}
.btn.sec{background:var(--bg3);color:var(--muted);border:1px solid var(--border);flex:1}
.btn.pri{background:var(--gold);color:#000;flex:2}
.btn.danger{background:var(--red);color:#fff;flex:1}
.btn:disabled{opacity:.25;pointer-events:none}

/* GAME SHELL */
.s-game{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;background:var(--bg)}
.g-header{display:flex;align-items:center;justify-content:space-between;padding:3px 12px;padding-top:max(3px,env(safe-area-inset-top));background:var(--bg2);border-bottom:1px solid var(--border);min-height:clamp(34px,5vh,52px);flex-shrink:0}
.g-mode-lbl{font-family:'Teko',sans-serif;font-size:clamp(14px,2vw,22px);color:var(--muted);letter-spacing:1px}
.g-sm-btn{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 12px;font-family:'Teko',sans-serif;font-size:clamp(13px,1.8vw,20px);color:var(--muted);cursor:pointer}
.g-sm-btn:active{opacity:.5}
.cp-bar{background:var(--bg2);border-bottom:2px solid var(--green);padding:4px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:clamp(48px,7vh,72px)}
.cp-name{font-family:'Teko',sans-serif;font-size:clamp(24px,4vw,48px);font-weight:700;color:var(--green);line-height:1}
.cp-dart-num{font-family:'Teko',sans-serif;font-weight:700;color:var(--text);letter-spacing:1px;text-align:right;line-height:1.1;flex-shrink:0}
.cp-dart-num .dart-throw{font-size:clamp(12px,1.8vw,20px);color:var(--muted);display:block}
.cp-dart-num .dart-total{font-size:clamp(22px,3.5vw,42px);color:var(--green)}

/* CRICKET BOARD — flex rows, no table */
.cboard{flex:1;display:flex;flex-direction:column;padding:0 8px;overflow:hidden;min-height:0}
.cb-header{display:flex;flex-shrink:0;border-bottom:2px solid var(--border);padding:2px 0}
.cb-header .cb-num{font-family:'Teko',sans-serif;font-size:clamp(12px,1.8vw,20px);color:transparent;padding-left:8px}
.cb-header .cb-pcol{flex:1;font-family:'Teko',sans-serif;font-size:clamp(10px,1.6vw,18px);letter-spacing:1px;color:var(--muted);text-align:center;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb-header .cb-pcol.cur{color:var(--green)}
.cb-rows{flex:1;display:flex;flex-direction:column;min-height:0}
.cb-row{flex:1;display:flex;align-items:center;min-height:0}
.cb-num{font-family:'Teko',sans-serif;font-size:clamp(28px,9vh,100px);font-weight:700;color:var(--muted);padding-left:8px;flex-shrink:0;width:clamp(58px,10vw,100px);line-height:1}
.cb-num.active-n{color:var(--green)}
.cb-num.done-n{color:var(--border2);text-decoration:line-through}
.cb-mark{flex:1;display:flex;align-items:center;justify-content:center;font-family:'Teko',sans-serif;font-weight:900;line-height:1}
.mk-s{font-size:clamp(20px,7vh,72px);color:var(--text)}
.mk-x{font-size:clamp(32px,9vh,100px);color:var(--text);line-height:0.85}
.cb-pts{flex:1;display:flex;align-items:center;justify-content:center;font-family:'Teko',sans-serif;font-size:max(18px,min(4.5vh,48px));color:var(--gold);font-weight:700}
.cb-pts-row{flex-shrink:0;display:flex;border-top:2px solid var(--border2);align-items:center}

/* X01 SCORE CARDS */
.x01-cards{display:flex;padding:5px 8px;gap:8px;overflow-x:auto;flex-shrink:0}
.x01-card{flex:1;background:var(--bg2);border-radius:10px;border:2px solid var(--border);padding:6px 10px;text-align:center;min-width:85px;position:relative}
.x01-card.cur{border-color:var(--green)}
.x01-cname{font-family:'Teko',sans-serif;font-size:clamp(13px,2vw,22px);color:var(--muted);line-height:1}
.x01-card.cur .x01-cname{color:var(--green)}
.x01-score{font-family:'Teko',sans-serif;font-size:clamp(52px,14vw,110px);font-weight:700;line-height:1;color:var(--text)}
.x01-card-sub{min-height:clamp(22px,3.5vw,38px);display:flex;flex-direction:column;align-items:center;justify-content:center}
.x01-checkout{font-family:'Teko',sans-serif;font-size:clamp(12px,2vw,20px);color:var(--gold);letter-spacing:.5px;line-height:1.2;min-height:0}
.x01-turn-score{font-family:'Teko',sans-serif;font-size:clamp(18px,2.8vw,32px);color:var(--gold);line-height:1;min-height:0}

/* SCORING PAD — D/T only */
.spad{flex-shrink:0;max-height:42vh;display:flex;flex-direction:column;padding:5px 8px calc(8px + env(safe-area-inset-bottom));gap:5px;overflow:hidden}
.spad.bot-turn{opacity:.35;pointer-events:none}
.mod-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;flex-shrink:0}
.mod-btn{border-radius:8px;border:2px solid var(--border);background:var(--bg2);font-family:'Teko',sans-serif;font-size:clamp(16px,2.5vw,30px);font-weight:700;cursor:pointer;padding:clamp(9px,1.5vh,18px) 4px;text-align:center;color:var(--muted)}
.mod-btn:active{transform:scale(.91)}
.mod-btn.sel{background:#2a1e00;border-color:var(--gold);color:var(--gold)}
.mod-btn.dm.sel{background:#0f2040;border-color:var(--blue);color:#93c5fd}
.mod-btn.tm.sel{background:#3b0a0a;border-color:var(--red);color:#fca5a5}
body.light .mod-btn.sel{background:#fdf3d0;color:#7a5c10}
body.light .mod-btn.dm.sel{background:#dbeafe;color:#1d4ed8}
body.light .mod-btn.tm.sel{background:#fee2e2;color:#b91c1c}
.nums-wrap{flex:1;min-height:0;display:grid;gap:5px}
.num-btn{border-radius:8px;border:2px solid var(--border);background:var(--bg3);font-family:'Teko',sans-serif;font-size:clamp(18px,3.5vw,36px);font-weight:700;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;min-height:clamp(44px,6vh,72px)}
.num-btn:active{transform:scale(.86)}
.num-btn.off{opacity:.14;pointer-events:none}
/* Default (single) */
.mod-1 .num-btn:not(.off){border-color:var(--green);background:#2a2000;color:#e8c96a}
/* Double */
.mod-2 .num-btn:not(.off){border-color:var(--blue);background:#0f2040;color:#93c5fd}
/* Triple */
.mod-3 .num-btn:not(.off){border-color:var(--red);background:#3b0a0a;color:#fca5a5}
body.light .mod-1 .num-btn:not(.off){background:#fdf3d0;color:#7a5c10}
body.light .mod-2 .num-btn:not(.off){background:#dbeafe;color:#1d4ed8}
body.light .mod-3 .num-btn:not(.off){background:#fee2e2;color:#b91c1c}

.mod-btn.dm.sel{background:#0f2040;border-color:var(--blue);color:#93c5fd}
.mod-btn.tm.sel{background:#3b0a0a;border-color:var(--red);color:#fca5a5}
body.light .mod-btn.dm.sel{background:#dbeafe;color:#1d4ed8}
body.light .mod-btn.tm.sel{background:#fee2e2;color:#b91c1c}
.ctrl-row{display:flex;gap:4px;flex-shrink:0}
.ctrl-btn{flex:1;border-radius:8px;font-family:'Teko',sans-serif;font-size:clamp(16px,2.5vw,30px);font-weight:700;cursor:pointer;padding:clamp(11px,1.8vh,20px) 4px;border:none}
.ctrl-btn:active{opacity:.6}
.miss-c{background:var(--bg2);color:var(--text);border:2px solid var(--gold)}
.miss-c:active{opacity:.6}
.undo-c{background:#1a1000;color:var(--gold);border:1px solid #f59e0b44}
.end-c{background:var(--green-dk);color:var(--green);border:1px solid var(--green);flex:1.4}

/* WIN */
.s-win{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;gap:12px;text-align:center}
.win-trophy{font-size:56px}.win-title{font-family:'Teko',sans-serif;font-size:50px;font-weight:700;color:var(--gold);letter-spacing:3px}
.win-name{font-family:'Teko',sans-serif;font-size:36px;color:var(--text)}
.win-stats{background:var(--bg2);border-radius:10px;padding:12px 20px;border:1px solid var(--border);width:100%;max-width:340px}
.srow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:15px}
.srow:last-child{border:none}
.sval{font-family:'Teko',sans-serif;font-size:20px;color:var(--green)}
.sval.dim{color:var(--muted)}

/* LEADERBOARD */
.s-lb{display:flex;flex-direction:column;height:100%;padding:12px;gap:8px}
.lb-filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;flex-shrink:0}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap}
.chip:active{opacity:.6}
.chip.on{background:var(--gold);color:#000;border-color:var(--gold)}
.lb-wrap{flex:1;overflow-y:auto}
.lb-tbl{width:100%;border-collapse:collapse;font-size:14px}
.lb-tbl th{text-align:left;padding:6px 8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg)}
.lb-tbl td{padding:8px 8px;border-bottom:1px solid #181818}
.lb-rank{font-family:'Teko',sans-serif;font-size:18px;color:var(--muted);text-align:center;width:34px}
.lb-name{font-family:'Teko',sans-serif;font-size:18px;font-weight:600}
.lb-sub{font-size:11px;color:var(--muted)}
.lb-darts{font-family:'Teko',sans-serif;font-size:22px;color:var(--green);text-align:right}
.lb-date{color:var(--muted);font-size:11px}
.empty{text-align:center;color:var(--muted);padding:36px;font-size:14px;line-height:1.9}
.clr-lb{background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:13px;padding:7px;cursor:pointer;flex-shrink:0}
.lb-del{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;opacity:.5}
.lb-del:active{opacity:1}

/* DRINKING MENU */
.s-drink{display:flex;flex-direction:column;height:100%;padding:clamp(12px,2vw,24px);gap:clamp(8px,1.5vw,16px);overflow:hidden}
.drink-header{display:flex;align-items:center;gap:12px;flex-shrink:0;padding-top:max(0px,env(safe-area-inset-top))}
.drink-title{font-family:'Teko',sans-serif;font-size:clamp(24px,4vw,48px);font-weight:700;letter-spacing:2px}
.drink-sub{font-size:clamp(11px,1.5vw,16px);color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.drink-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,1.5vw,16px);flex:1;overflow-y:auto}
.dcard{background:var(--bg2);border:2px solid var(--border);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,2vh,24px);text-align:center;padding:8px}
.dcard:active{opacity:.65}
.dcard .di{font-size:clamp(52px,12vmin,110px);line-height:1}
.dcard .dn{font-family:'Teko',sans-serif;font-size:clamp(26px,5vw,54px);font-weight:700;line-height:1.1}
.dcard.atw{border-color:var(--green-dk)}.dcard.atw .dn{color:var(--gold)}
.dcard.hb{border-color:var(--green-dk)}.dcard.hb .dn{color:var(--gold)}
.dcard.sh{border-color:var(--green-dk)}.dcard.sh .dn{color:var(--gold)}
.dcard.kl{border-color:var(--green-dk)}.dcard.kl .dn{color:var(--gold)}
.dcard.golf{border-color:var(--green-dk)}.dcard.golf .dn{color:var(--gold)}
body.light .dcard.atw,body.light .dcard.hb,body.light .dcard.sh,body.light .dcard.kl,body.light .dcard.golf{border-color:#8B6914}
body.light .dcard.atw .dn,body.light .dcard.hb .dn,body.light .dcard.sh .dn,body.light .dcard.kl .dn,body.light .dcard.golf .dn{color:#7a5c10}

/* DRINKING GAME SCREEN */
.s-dg{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.dg-header{display:flex;align-items:center;justify-content:space-between;padding:3px 10px;padding-top:max(3px,env(safe-area-inset-top));background:var(--bg2);border-bottom:1px solid var(--border);min-height:34px;flex-shrink:0}
.dg-title{font-family:'Teko',sans-serif;font-size:17px;letter-spacing:1px}
.dg-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:6px 8px;gap:6px}
.dg-players{display:flex;gap:0;flex-shrink:0;border-bottom:1px solid var(--border)}
.dg-pcard{flex:1;text-align:center;padding:6px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-right:1px solid var(--border)}
.dg-pcard:last-child{border-right:none}
.dg-pcard.done{opacity:.4}
.dg-pcard.killer{background:rgba(239,68,68,0.08)}
.dg-pname{font-family:'Teko',sans-serif;font-size:clamp(13px,2.5vw,22px);color:var(--muted);line-height:1}
.dg-pcard.cur .dg-pname{color:var(--gold)}
.dg-pval{font-family:'Teko',sans-serif;font-size:clamp(60px,14vh,180px);font-weight:700;color:var(--text);line-height:1}
.dg-pcard.cur .dg-pval{color:var(--gold)}
.dg-psub{font-size:clamp(11px,1.8vw,16px);color:var(--muted);line-height:1}
.dg-info{background:var(--bg2);border-radius:9px;padding:8px 12px;border:1px solid var(--border);flex-shrink:0}
.dg-info-main{font-family:'Teko',sans-serif;font-size:clamp(18px,3.5vw,28px);font-weight:700;color:var(--gold)}
.dg-info-sub{font-size:clamp(12px,1.8vw,16px);color:var(--muted);margin-top:2px}
.dg-pad{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px}
.dg-nums{flex:1;min-height:0;max-height:clamp(80px,18vh,140px);display:grid;gap:6px}
.dg-num{border-radius:7px;border:2px solid var(--border);background:var(--bg3);font-family:'Teko',sans-serif;font-size:clamp(14px,3.5vw,22px);font-weight:700;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center}
.dg-num:active{transform:scale(.87)}
.dg-num.hit{border-color:var(--green);background:#2a2000;color:#e8c96a}
.dg-num.dbl{border-color:var(--blue);background:#0f2040;color:#93c5fd}
.dg-num.tpl{border-color:var(--red);background:#3b0a0a;color:#fca5a5}
body.light .dg-num.hit{background:#fdf3d0;color:#7a5c10}
body.light .dg-num.dbl{background:#dbeafe;color:#1d4ed8}
body.light .dg-num.tpl{background:#fee2e2;color:#b91c1c}
.dg-ctrl{display:flex;gap:6px;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);min-height:clamp(50px,8vh,80px)}

/* OVERLAY + TOAST */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:900}
.ov-box{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:22px 18px;max-width:300px;width:90%;text-align:center}
.ov-msg{font-size:17px;line-height:1.5;margin-bottom:6px}
.ov-drink{font-family:'Teko',sans-serif;font-size:42px;color:var(--gold);margin:6px 0}
.ov-sub{font-size:14px;color:var(--muted);margin-bottom:16px}
.ov-btns{display:flex;gap:8px}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#7f1d1d;color:#fca5a5;font-family:'Teko',sans-serif;font-size:28px;padding:12px 28px;border-radius:10px;z-index:950;pointer-events:none;border:2px solid var(--red);letter-spacing:1px;text-align:center}
.drink-toast{background:#451a03;color:var(--gold);border-color:var(--gold)}
/* ── PHONE RESPONSIVE (≤480px) ── */
@media(max-width:480px){
  .home-logo{width:64px;height:64px}
  .logo{font-size:clamp(30px,8vw,42px);margin:3px 0}
  .mcard .mn{font-size:clamp(18px,4vh,36px)}
  .mcard .md{font-size:clamp(11px,1.8vh,18px);color:#aaa}
  .mcard{padding:8px 10px}
  .spad{max-height:46vh}
  .cboard{flex:1}
  .cp-name{font-size:clamp(18px,5vw,26px)}
  .cp-dart-num{font-size:clamp(18px,5vw,26px)}
  .x01-score{font-size:clamp(40px,16vw,72px)}
  .dcard .di{font-size:clamp(32px,10vmin,56px)}
  .dcard .dn{font-size:clamp(18px,5vw,28px)}
  .drink-title{font-size:clamp(20px,6vw,32px)}
  .ctrl-btn{font-size:clamp(13px,3.8vw,18px);padding:8px 3px}
  .mod-btn{font-size:clamp(13px,3.8vw,18px);padding:7px 3px}
  .g-header{height:30px}
  .cp-bar{height:38px}
  .theme-toggle{top:6px;right:6px;padding:3px 8px;font-size:11px}
  .dg-pval{font-size:clamp(44px,12vh,90px)}
  .dg-pname{font-size:clamp(12px,3vw,18px)}
  .num-btn{min-height:clamp(38px,5.5vh,56px);font-size:clamp(16px,4.5vw,26px)}
}
</style>

const CNUMS=[20,19,18,17,16,15,'bull'];
const BOARD=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
const MODE_LABELS={dj:"DJ's Cricket",garage:'Garage Cricket',classic:'Classic Cricket','301':'301','501':'501'};
const ALL_MODES=['dj','garage','classic','301','501'];

// ── MAIN STATE ──
let S={screen:'home',mode:null,players:[],cur:0,darts:0,winner:null,lbMode:'dj',opts:{doubleIn:false,doubleOut:false},mod:1,undoStack:[],turnPts:[],soundOn:true};
// Unlock AudioContext on first interaction
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}
function playTap(){
  if(!S.soundOn) return;
  try{
    const ctx=getAudioCtx();const t=ctx.currentTime;
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.value=520;
    g.gain.setValueAtTime(0.18,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.07);
    o.start(t);o.stop(t+0.07);
  }catch(e){}
}
function playMiss(){
  if(!S.soundOn) return;
  try{
    const ctx=getAudioCtx();const t=ctx.currentTime;
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(180,t);
    o.frequency.exponentialRampToValueAtTime(40,t+0.3);
    g.gain.setValueAtTime(0.9,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.start(t);o.stop(t+0.3);
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=ctx.createBufferSource();src.buffer=buf;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.5,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    src.connect(ng);ng.connect(ctx.destination);src.start(t);
  }catch(e){}
}

// ── DRINKING GAME STATE ──
let DS={game:null,players:[],cur:0,darts:0,mod:1,data:{},undoStack:[]};
function dgPushUndo(){DS.undoStack.push({data:JSON.parse(JSON.stringify(DS.data)),cur:DS.cur,mod:DS.mod});}
function dgUndo(){
  if(!DS.undoStack.length){showToast('Nothing to undo');return;}
  const u=DS.undoStack.pop();
  DS.data=u.data;DS.cur=u.cur;DS.mod=u.mod;
  renderDGPlay();
}

// ── FACTORIES ──
function newCricket(name){const marks={};CNUMS.forEach(n=>marks[n]=0);return{name,marks,pts:0,dartsThrown:0};}
function newX01(name,start,di){return{name,score:start,dartsThrown:0,checkedIn:!di};}

// ── UNDO ──
function pushUndo(){S.undoStack.push({players:JSON.parse(JSON.stringify(S.players)),cur:S.cur,darts:S.darts,turnPts:[...S.turnPts]});if(S.undoStack.length>5)S.undoStack.shift();}
function undoDart(){if(!S.undoStack.length)return;const u=S.undoStack.pop();S.players=u.players;S.cur=u.cur;S.darts=u.darts;S.turnPts=u.turnPts||[];render();}

// ── CRICKET HELPERS ──
function activeNum(p){for(const n of CNUMS)if(p.marks[n]<3)return n;return null;}
function allClosed(p){return CNUMS.every(n=>p.marks[n]>=3);}

// ── CRICKET HIT ──
function cricketHit(num){
  if(num==='bull'&&S.mod===3){showToast("No triple bull!");render();return;} // safety guard
  const mult=S.mod;pushUndo();
  const p=S.players[S.cur];p.dartsThrown++;S.darts++;
  if(S.mode==='dj'){const an=activeNum(p);if(num!==an){checkEnd();render();return;}}

  if(S.mode==='classic'){
    const numVal=num==='bull'?25:num;
    const before=p.marks[num];
    if(before>=3){
      // Already closed — score points if opponent hasn't closed it
      if(!S.players.every(pl=>pl.marks[num]>=3)){
        p.pts+=mult*(num==='bull'?25:num);
      }
    } else {
      // Not yet closed — add marks, overflow becomes points
      const after=Math.min(before+mult,3);
      const overflow=mult-(after-before);
      p.marks[num]=after;
      if(overflow>0&&!S.players.every(pl=>pl.marks[num]>=3)){
        p.pts+=overflow*numVal;
      }
    }
    if(allClosed(p)&&p.pts>=Math.max(...S.players.map(pl=>pl.pts))){triggerWin(p);return;}
  } else {
    const before=p.marks[num],after=Math.min(before+mult,3);
    p.marks[num]=after;
    if(S.mode!=='dj'&&allClosed(p)){triggerWin(p);return;}
    if(S.mode==='dj'&&allClosed(p)){triggerWin(p);return;}
  }
  S.mod=1;checkEnd();render();
}
function cricketMiss(){pushUndo();playMiss();S.players[S.cur].dartsThrown++;S.darts++;checkEnd();render();}

// ── X01 HIT ──
function x01Hit(num){
  const mult=S.mod;if(num==='bull'&&mult===3)return;
  pushUndo();const p=S.players[S.cur];p.dartsThrown++;S.darts++;
  if(!p.checkedIn){if(mult!==2){showToast('Need a Double\nto check in!');checkEnd();render();return;}p.checkedIn=true;}
  const val=num==='bull'?(mult===2?50:25):num*mult;
  const ns=p.score-val;
  if(ns<0){showToast('BUST!');S.turnPts=[];advance();render();return;}
  if(ns===0){if(S.opts.doubleOut&&mult!==2){showToast('Need Double Out!');S.turnPts=[];advance();render();return;}p.score=0;triggerWin(p);return;}
  if(S.opts.doubleOut&&ns===1){showToast("BUST!\nCan't finish on 1.");S.turnPts=[];advance();render();return;}
  p.score=ns;S.turnPts.push(val);S.mod=1;
  checkEnd();render();
}
function x01Miss(){pushUndo();playMiss();S.players[S.cur].dartsThrown++;S.darts++;S.turnPts.push(0);checkEnd();render();}

// ── TURN MGMT ──
function checkEnd(){
  if(S.mode==='classic'){
    // Check if all numbers dead (both players closed everything)
    const allDead=CNUMS.every(n=>S.players.every(p=>p.marks[n]>=3));
    if(allDead){
      const maxPts=Math.max(...S.players.map(p=>p.pts));
      const winner=S.players.find(p=>p.pts===maxPts);
      if(winner){triggerWin(winner);return;}
    }
  }
  if(S.darts>=3){S.turnPts=[];advance();}
}
function advance(){
  S.darts=0;
  S.cur=(S.cur+1)%S.players.length;
  // Skip dead players (shouldn't happen in cricket/x01 but safety)
}
function endTurn(){S.turnPts=[];advance();render();}
function triggerWin(p){S.winner=p;S.screen='win';render();}

// ── FIREBASE REST ──
async function getLBCloud(m){
  if(!FB_URL) return [];
  try{
    const r=await fetch(`${FB_URL}/leaderboard/${m}.json`);
    const data=await r.json();
    if(!data) return [];
    return Object.values(data).sort((a,b)=>a.darts-b.darts);
  }catch(e){return [];}
}
async function saveLBCloud(m,entry){
  if(!FB_URL) return;
  try{
    await fetch(`${FB_URL}/leaderboard/${m}.json`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(entry)
    });
  }catch(e){console.warn('Cloud save failed',e);}
}
async function clearLBCloud(m){
  if(!FB_URL) return;
  try{await fetch(`${FB_URL}/leaderboard/${m}.json`,{method:'DELETE'});}catch(e){}
}

// ── MERGED: local + cloud ──
async function getLB(m){
  const local=getLBLocal(m);
  if(!FB_URL) return local;
  const cloud=await getLBCloud(m);
  // Merge: union by name+darts+date, dedupe, sort
  const all=[...local,...cloud];
  const seen=new Set();
  const merged=all.filter(e=>{
    const k=e.name+'|'+e.darts+'|'+e.date;
    if(seen.has(k)) return false;
    seen.add(k);return true;
  });
  merged.sort((a,b)=>a.darts-b.darts);
  // Cache merged back locally
  saveLBLocal(m,merged);
  return merged;
}

async function saveLBEntry(){
  const w=S.winner;
  const entry={name:w.name,darts:w.dartsThrown,date:new Date().toLocaleDateString(),players:S.players.length};
  // Save locally first (instant)
  const local=getLBLocal(S.mode);
  local.push(entry);local.sort((a,b)=>a.darts-b.darts);
  saveLBLocal(S.mode,local);
  // Save to cloud (async, non-blocking)
  saveLBCloud(S.mode,entry);
  S.lbMode=S.mode;S.screen='leaderboard';render();
}

// Dartboard clockwise order for neighbor calculation
const BOARD_RING=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
const BOARD_NEIGHBORS={};
BOARD_RING.forEach((n,i)=>{
  const prev=BOARD_RING[(i-1+20)%20];
  const next=BOARD_RING[(i+1)%20];
  BOARD_NEIGHBORS[n]=[prev,next];
});
BOARD_NEIGHBORS['bull']=[25]; // outer bull neighbor

// ── DARTBOT ENGINE ──
const DARTBOT_LEVELS={
  rookie: {name:'Rookie 🎯',target:0.20,neighbor:0.35,miss:0.45,dblMult:0.15,tplMult:0.10},
  bar:    {name:'Bar Player 🍺',target:0.55,neighbor:0.30,miss:0.15,dblMult:0.40,tplMult:0.30},
  shark:  {name:'Shark 🦈',target:0.82,neighbor:0.15,miss:0.03,dblMult:0.65,tplMult:0.55}
};

function newDartbot(difficulty='rookie'){
  return {name:'R2Dart2',isBot:true,botLevel:difficulty,marks:{},pts:0,dartsThrown:0,score:0,checkedIn:false};
}

// Simulate one dart throw at a target number, returning {num, mult}
// mult: 1=single, 2=double, 3=triple
function botThrow(targetNum, wantMult, level){
  const cfg=DARTBOT_LEVELS[level];
  const r=Math.random();
  let hitNum;
  if(r < cfg.miss){
    // Complete miss — random number not on board, score 0
    return {num:0, mult:1, scored:0};
  } else if(r < cfg.miss + cfg.neighbor){
    // Hit a neighbor
    const neighbors=BOARD_NEIGHBORS[targetNum]||[targetNum];
    hitNum=neighbors[Math.floor(Math.random()*neighbors.length)];
  } else {
    hitNum=targetNum;
  }
  // Determine multiplier
  let mult=1;
  if(wantMult===3 && Math.random()<cfg.tplMult) mult=3;
  else if(wantMult===2 && Math.random()<cfg.dblMult) mult=2;
  else if(wantMult===3 || wantMult===2){
    // Wanted D/T but got single
    mult=1;
  }
  const val=hitNum==='bull'?(mult===2?50:25):(hitNum*mult);
  return {num:hitNum, mult, scored:val};
}

// Pick what R2Dart2 aims at for cricket
function botCricketTarget(bot, mode, players){
  if(mode==='dj'){
    // Must follow order
    for(const n of [20,19,18,17,16,15,'bull']){
      if((bot.marks[n]||0)<3) return {num:n,wantMult:3};
    }
    return {num:'bull',wantMult:2};
  }
  // Garage/Classic — aim at highest unclosed number
  for(const n of [20,19,18,17,16,15,'bull']){
    if((bot.marks[n]||0)<3) return {num:n,wantMult:3};
  }
  return {num:'bull',wantMult:2};
}

// Pick what R2Dart2 aims at for x01
function botX01Target(bot, opts){
  const score=bot.score;
  if(score<=170 && CHECKOUT[score]){
    // Aim for checkout
    const parts=CHECKOUT[score].split(' ');
    const first=parts[0];
    if(first.startsWith('T')) return {num:+first.slice(1)||'bull',wantMult:3};
    if(first.startsWith('D')) return {num:first==='D25'?'bull':+first.slice(1),wantMult:2};
    if(first==='Bull') return {num:'bull',wantMult:2};
  }
  // Default — aim T20
  return {num:20,wantMult:3};
}

// Run a full R2Dart2 cricket turn — returns array of throw results + updated player
function runBotCricketTurn(bot, mode, players, level){
  const throws=[];
  const b={...bot, marks:{...bot.marks}};
  for(let d=0;d<3;d++){
    const {num,wantMult}=botCricketTarget(b, mode, players);
    const result=botThrow(num, wantMult, level);
    b.dartsThrown++;
    if(result.num!==0 && [20,19,18,17,16,15,'bull'].includes(result.num)){
      const before=(b.marks[result.num]||0);
      const after=Math.min(before+result.mult,3);
      const overflow=result.mult-(after-before);
      b.marks[result.num]=after;
      if(mode==='classic' && overflow>0){
        // Check if any opponent hasn't closed it
        const oppsOpen=players.some(p=>!p.isBot&&(p.marks[result.num]||0)<3);
        if(oppsOpen) b.pts+=(overflow*(result.num==='bull'?25:result.num));
      }
      // Scoring in classic after closed
      if(mode==='classic' && before>=3){
        const oppsOpen=players.some(p=>!p.isBot&&(p.marks[result.num]||0)<3);
        if(oppsOpen) b.pts+=(result.mult*(result.num==='bull'?25:result.num));
      }
    }
    throws.push({...result, target:num});
    // Check win after each dart
    if([20,19,18,17,16,15,'bull'].every(n=>(b.marks[n]||0)>=3)){
      if(mode!=='classic' || b.pts>=Math.max(...players.map(p=>p.pts), b.pts)){
        return {throws, bot:b, won:true};
      }
    }
  }
  return {throws, bot:b, won:false};
}

// Run a full R2Dart2 x01 turn — returns array of throw results + updated player
function runBotX01Turn(bot, opts, level){
  const throws=[];
  const b={...bot};
  for(let d=0;d<3;d++){
    if(b.score<=0) break;
    const {num,wantMult}=botX01Target(b, opts);
    const result=botThrow(num, wantMult, level);
    b.dartsThrown++;
    if(result.num===0){throws.push({...result,target:num});continue;}
    if(!b.checkedIn){
      if(result.mult===2){b.checkedIn=true;}
      else{throws.push({...result,target:num,missed:true});continue;}
    }
    const val=result.num==='bull'?(result.mult===2?50:25):result.num*result.mult;
    const ns=b.score-val;
    if(ns<0||ns===1){throws.push({...result,target:num,bust:true});break;}
    b.score=ns;
    throws.push({...result,target:num,scored:val});
    if(b.score===0){return {throws,bot:b,won:true};}
  }
  return {throws,bot:b,won:false};
}

// ── BOT TURN RUNNER ──
function runBotTurn(){
  const p=S.players[S.cur];
  if(!p||!p.isBot||S.winner) return;
  const level=p.botLevel||'rookie';
  const isX01=S.mode==='301'||S.mode==='501';
  let result;

  if(isX01){
    result=runBotX01Turn(p,S.opts,level);
    // Apply result to player
    S.players[S.cur]=result.bot;
    S.players[S.cur].dartsThrown=result.bot.dartsThrown;
    if(result.won){triggerWin(S.players[S.cur]);return;}
  } else {
    result=runBotCricketTurn(p,S.mode,S.players,level);
    S.players[S.cur]=result.bot;
    if(result.won){triggerWin(S.players[S.cur]);return;}
    // Check classic win
    if(S.mode==='classic'){
      const b=S.players[S.cur];
      if(allClosed(b)&&b.pts>=Math.max(...S.players.map(pl=>pl.pts))){triggerWin(b);return;}
    }
  }

  // Show bot turn summary as toast
  const throwDescs=result.throws.map(t=>{
    if(t.num===0) return 'Miss';
    const m=t.mult===3?'T':t.mult===2?'D':'';
    const n=t.num==='bull'?'Bull':t.num;
    return m+n;
  });
  const summary=throwDescs.join(', ');
  showToast('🎯 R2Dart2: '+summary,false);

  // Check classic end
  if(S.mode==='classic'){
    const allDead=CNUMS.every(n=>S.players.every(pl=>pl.marks[n]>=3));
    if(allDead){
      const maxPts=Math.max(...S.players.map(pl=>pl.pts));
      const winner=S.players.find(pl=>pl.pts===maxPts);
      if(winner){triggerWin(winner);return;}
    }
  }

  S.turnPts=[];
  advance();
  setTimeout(()=>render(),400);
}

  const lbl=isDJ?"DJ's Cricket":isCls?'Classic Cricket':'Garage Cricket';
  function off(n){

function getCheckout(score,dartsLeft){
  if(score>170||score<2) return null;
  dartsLeft=dartsLeft||3;
  if(dartsLeft===1){
    if(ONE_DART_OUTS.has(score)) return score===50?'Bull':('D'+(score/2));
    return null; // can't finish in 1
  }
  if(BOGEYS.has(score)) return dartsLeft>=3?'No 3-dart finish':null;
  const co=CHECKOUT[score];
  if(!co) return null;
  const parts=co.split(' ');
  if(dartsLeft===1&&parts.length>1) return null; // needs more darts than available
  if(dartsLeft===2&&parts.length>2) return null;
  return co;
}

function initDGame(){
  const pn=DS.players.length;
  if(DS.game==='atw'){
    const tgts=[...BOARD,'bull'];
    DS.data={targets:tgts,progress:DS.players.map(()=>0),done:DS.players.map(()=>false),throwsUsed:0};
  }else if(DS.game==='highball'){
    DS.data={round:1,scores:DS.players.map(()=>0),darts:DS.players.map(()=>0),showResults:false};
  }else if(DS.game==='shanghai'){
    // Cricket numbers in random order
    const pool=[20,19,18,17,16,15,'bull'];
    const rounds=[];const p2=[...pool];
    while(p2.length){const i=Math.floor(Math.random()*p2.length);rounds.push(p2.splice(i,1)[0]);}
    DS.data={rounds,round:0,maxRound:7,pts:DS.players.map(()=>0),dartCount:DS.players.map(()=>0),misses:0};
  }else if(DS.game==='golf'){
    const start=DS.data.startHole||1;
    const end=DS.data.endHole||20;
    const holes=Array.from({length:end-start+1},(_,i)=>i+start);
    DS.data={...DS.data,holes,holeIdx:0,scores:DS.players.map(()=>0),holeScores:DS.players.map(()=>[]),curDart:0,curResult:null,phase:'throw'};
  }else if(DS.game==='killer'){
    const nums=shuffleNums(pn);
    DS.data={nums,armed:DS.players.map(()=>false),armDarts:DS.players.map(()=>0),lives:DS.players.map(()=>3),out:DS.players.map(()=>false),targetIdx:DS.players.map(()=>0)};
  }
}

function shuffleNums(n){
  const pool=[...Array(20)].map((_,i)=>i+1);
  const out=[];while(out.length<n){const i=Math.floor(Math.random()*pool.length);out.push(pool.splice(i,1)[0]);}
  return out;
}

// ── GOLF ──
const GOLF_SCORES={
  eagle:    {label:'Eagle',     val:-2,color:'#22c55e',emoji:'🦅'},
  birdie:   {label:'Birdie',    val:-1,color:'#4ade80',emoji:'🐦'},
  par:      {label:'Par',       val:0, color:'#f0f0f0',emoji:'⛳'},
  bogey:    {label:'Bogey',     val:1, color:'#f87171',emoji:'😬'},
  dbl_bogey:{label:'Dbl Bogey', val:2, color:'#ef4444',emoji:'😱'},
  tpl_bogey:{label:'Tpl Bogey', val:3, color:'#b91c1c',emoji:'💀'},
};

function golfScoreKey(result){
  if(result==='target_triple') return 'eagle';
  if(result==='target_double') return 'birdie';
  if(result==='target_single') return 'par';
  if(result==='adjacent')      return 'bogey';
  if(result==='other_board')   return 'dbl_bogey';
  if(result==='miss')          return 'tpl_bogey';
  return 'par';
}

function golfScoreName(key){return GOLF_SCORES[key]||GOLF_SCORES.par;}

// Bot Golf turn
function botGolfTurn(bot, holeNum, level){
  const cfg=DARTBOT_LEVELS[level];
  // Determine what bot would score on one dart
  function oneDart(){
    const r=Math.random();
    if(r<0.02) return 'miss';
    if(r<0.02+cfg.miss*0.2) return 'other_board';
    if(r<0.02+cfg.miss*0.5) return 'adjacent';
    const onTgt=Math.random();
    if(onTgt<cfg.tplMult*cfg.target) return 'target_triple';
    if(onTgt<(cfg.tplMult+cfg.dblMult)*cfg.target) return 'target_double';
    if(onTgt<cfg.target) return 'target_single';
    return 'adjacent';
  }
  const pressThreshold={rookie:'par',bar:'birdie',shark:'eagle'};
  const threshold=pressThreshold[level];
  const threshVals={eagle:-2,birdie:-1,par:0,bogey:1,dbl_bogey:2,tpl_bogey:3};
  let result=oneDart();
  let darts=1;
  while(darts<3){
    const curVal=threshVals[golfScoreKey(result)];
    const threshVal=threshVals[threshold];
    if(curVal<=threshVal) break; // take it
    result=oneDart(); // press
    darts++;
  }
  return golfScoreKey(result);
}

function renderGolf(a){
  const d=DS.data,ps=DS.players;
  if(!d||!d.holes) return;

  // ── FINAL SCORECARD ──
  if(d.phase==='final'){
    const front=d.holes.filter(h=>h<=10);
    const back=d.holes.filter(h=>h>10);
    // Build scorecard rows
    const headerRow=(holes)=>holes.map(h=>`<th style="text-align:center;padding:4px 6px;font-size:clamp(10px,1.8vw,16px)">${h}</th>`).join('');
    const scoreRow=(p,pi,holes,offset)=>holes.map((h,i)=>{
      const sc=d.holeScores[pi][offset+i];
      const key=sc!=null?Object.keys(GOLF_SCORES).find(k=>GOLF_SCORES[k].val===sc)||'par':'par';
      const color=sc<0?'#4ade80':sc>0?'#f87171':'#f0f0f0';
      return`<td style="text-align:center;padding:3px 4px;font-size:clamp(11px,2vw,18px);color:${color};font-weight:700">${sc!=null?(sc>0?'+'+sc:sc):'-'}</td>`;
    }).join('');
    const totRow=(pi,holes,offset)=>{
      const tot=holes.reduce((s,_,i)=>{const sc=d.holeScores[pi][offset+i];return s+(sc!=null?sc:0);},0);
      return`<td style="text-align:center;padding:3px 6px;font-size:clamp(12px,2vw,18px);font-weight:700;color:var(--gold)">${tot>0?'+'+tot:tot}</td>`;
    };

    const sortedPs=[...ps.map((p,i)=>({p,i,total:d.scores[i]}))].sort((a,b)=>a.total-b.total);
    const minScore=sortedPs[0].total;
    const maxScore=sortedPs[sortedPs.length-1].total;
    const losers=sortedPs.filter(x=>x.total===maxScore);

    const frontRows=front.length?`
      <tr style="background:var(--bg3)"><th style="padding:4px 8px;text-align:left;font-size:clamp(10px,1.8vw,14px)">Hole</th>${headerRow(front)}<th style="padding:4px 6px;font-size:clamp(10px,1.8vw,14px)">Out</th></tr>
      ${ps.map((p,pi)=>`<tr><td style="padding:3px 8px;font-family:'Teko',sans-serif;font-size:clamp(13px,2.5vw,20px);white-space:nowrap">${p.name}</td>${scoreRow(p,pi,front,0)}${totRow(pi,front,0)}</tr>`).join('')}`:'';
    const backRows=back.length?`
      <tr style="background:var(--bg3)"><th style="padding:4px 8px;text-align:left;font-size:clamp(10px,1.8vw,14px)">Hole</th>${headerRow(back)}<th style="padding:4px 6px;font-size:clamp(10px,1.8vw,14px)">In</th></tr>
      ${ps.map((p,pi)=>`<tr><td style="padding:3px 8px;font-family:'Teko',sans-serif;font-size:clamp(13px,2.5vw,20px);white-space:nowrap">${p.name}</td>${scoreRow(p,pi,back,front.length)}${totRow(pi,back,front.length)}</tr>`).join('')}`:'';
    const totalRows=`
      <tr style="background:var(--bg3)"><th style="padding:4px 8px;text-align:left;font-size:clamp(10px,1.8vw,14px)">Player</th><th colspan="${d.holes.length}" style="padding:4px 6px;font-size:clamp(10px,1.8vw,14px)">Total</th></tr>
      ${sortedPs.map(({p,i,total},rank)=>`<tr style="${rank===0?'background:rgba(201,168,76,0.15)':''}"><td style="padding:3px 8px;font-family:'Teko',sans-serif;font-size:clamp(13px,2.5vw,20px)">${rank===0?'🏆 ':''}${p.name}</td><td colspan="${d.holes.length}" style="text-align:center;font-family:'Teko',sans-serif;font-size:clamp(18px,4vw,32px);font-weight:700;color:${total<0?'#4ade80':total>0?'#f87171':'#f0f0f0'}">${total>0?'+'+total:total}</td></tr>`).join('')}`;

    a.innerHTML=`<div class="s-dg">
      <div class="dg-header"><span class="dg-title">⛳ Golf — Final Scorecard</span></div>
      <div class="dg-body" style="overflow-y:auto;padding:8px">
        <div style="font-family:'Teko',sans-serif;font-size:clamp(22px,5vw,40px);color:var(--gold);text-align:center;margin-bottom:8px">🏆 ${sortedPs[0].p.name} Wins!</div>
        <div style="font-size:clamp(13px,2vw,18px);color:#f87171;text-align:center;margin-bottom:12px">🍺 ${losers.map(x=>x.p.name).join(' & ')} ${losers.length>1?'both finish':'finishes'} their drink!</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-family:'Barlow Condensed',sans-serif">
            ${frontRows}${backRows}${totalRows}
          </table>
        </div>
        <div class="nav-row" style="margin-top:12px">
          <button class="btn sec" id="golf-menu">🏠 Done</button>
          <button class="btn pri" id="golf-again">Play Again</button>
        </div>
      </div>
    </div>`;
    document.getElementById('golf-menu').onclick=()=>{S.screen='drinking';render();};
    document.getElementById('golf-again').onclick=()=>{initDGame();DS.cur=0;renderDGPlay();};
    return;
  }

  // ── BETWEEN HOLES ──
  if(d.phase==='between'){
    const holeNum=d.holes[d.holeIdx-1];
    // Find worst score this hole
    const holeResults=d.holeScores.map(hs=>hs[d.holeIdx-1]);
    const maxVal=Math.max(...holeResults);
    const drinkers=ps.filter((_,i)=>holeResults[i]===maxVal);
    const rows=ps.map((p,i)=>{
      const sc=holeResults[i];
      const key=Object.keys(GOLF_SCORES).find(k=>GOLF_SCORES[k].val===sc)||'par';
      const gs=GOLF_SCORES[key];
      const isDrinker=holeResults[i]===maxVal;
      const scStr=(sc>0?'+':'')+sc;
      return`<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:10px 12px;font-family:'Teko',sans-serif;font-size:clamp(18px,4vw,32px);white-space:nowrap">${p.name}</td>
        <td style="padding:10px 12px;font-family:'Teko',sans-serif;font-size:clamp(16px,3.5vw,28px);color:${gs.color};white-space:nowrap">${gs.emoji} ${gs.label}</td>
        <td style="padding:10px 12px;font-family:'Teko',sans-serif;font-size:clamp(16px,3.5vw,28px);color:${gs.color};text-align:right;white-space:nowrap">${scStr}</td>
        <td style="padding:10px 12px;font-size:clamp(14px,2.5vw,22px);text-align:right">${isDrinker?'🍺':'&nbsp;'}</td>
      </tr>`;
    }).join('');
    const isLast=d.holeIdx>=d.holes.length;
    a.innerHTML=`<div class="s-dg">
      <div class="dg-header"><span class="dg-title">⛳ Hole ${holeNum} Results</span></div>
      <div class="dg-body" style="overflow-y:auto">
        <div style="font-family:'Teko',sans-serif;font-size:clamp(24px,5vw,44px);color:var(--gold);text-align:center;padding:8px 0">Hole ${holeNum} — #${d.holeIdx} of ${d.holes.length}</div>
        <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:10px">${rows}</table>
        <div style="font-family:'Teko',sans-serif;font-size:clamp(14px,2.5vw,22px);color:var(--muted);text-align:center;margin-bottom:8px">
          ${drinkers.map(p=>p.name).join(' & ')} drink${drinkers.length>1?'':'s'} 🍺
        </div>
        <div style="display:flex;gap:8px;margin-top:auto">
          <button class="btn pri" id="golf-next" style="flex:1">${isLast?'Final Scorecard →':'Next Hole →'}</button>
        </div>
      </div>
    </div>`;
    document.getElementById('golf-next').onclick=()=>{
      if(isLast){d.phase='final';renderDGPlay();}
      else{d.phase='throw';DS.cur=0;renderDGPlay();}
    };
    return;
  }

  // ── ACTIVE HOLE — THROW PHASE ──
  const holeNum=d.holes[d.holeIdx];
  const cp=ps[DS.cur];
  const curResult=d.curResult;
  const gs=curResult?GOLF_SCORES[golfScoreKey(curResult)]:null;

  const pcards=ps.map((p,i)=>{
    const sc=d.scores[i];
    const scColor=sc<0?'var(--green)':sc>0?'var(--red)':'var(--text)';
    return`<div class="dg-pcard ${i===DS.cur?'cur':''}">
      <div class="dg-pname">${p.name}</div>
      <div style="font-family:'Teko',sans-serif;font-size:clamp(56px,16vh,160px);font-weight:700;line-height:1;color:${i===DS.cur?'var(--gold)':scColor}">${sc>0?'+'+sc:sc}</div>
      <div class="dg-psub">total</div>
    </div>`;
  }).join('');

  // Score buttons
  const golfBtnColors={
    target_triple:{bg:'#0a2e0a',border:'#22c55e',color:'#4ade80'},
    target_double:{bg:'#0d2e12',border:'#16a34a',color:'#86efac'},
    target_single:{bg:'var(--bg2)',border:'var(--border2)',color:'var(--text)'},
    adjacent:     {bg:'#2a1010',border:'#dc2626',color:'#fca5a5'},
    other_board:  {bg:'#3b0a0a',border:'#b91c1c',color:'#f87171'},
    miss:         {bg:'#4a0606',border:'#991b1b',color:'#ef4444'},
  };
  const scoreButtons=[
    {key:'target_triple',label:'🦅 Eagle (-2)'},
    {key:'target_double',label:'🐦 Birdie (-1)'},
    {key:'target_single',label:'⛳ Par (0)', wide:true},
    {key:'adjacent',     label:'😬 Bogey (+1) · Adjacent or Bull', wide:true},
    {key:'other_board',  label:'😱 Dbl Bogey (+2) · Any other number', wide:true},
    {key:'miss',         label:'💀 Tpl Bogey (+3) · Off board', wide:true},
  ].map(b=>{
    const c=golfBtnColors[b.key];
    const isSel=curResult===b.key;
    return`<button class="dg-num ${isSel?'sel':''}" data-gr="${b.key}" style="font-size:clamp(18px,5vh,42px);font-weight:700;padding:0 6px;background:${isSel?c.bg:'var(--bg2)'};border-color:${isSel?c.border:'var(--border)'};color:${isSel?c.color:'var(--muted)'};${b.wide?'grid-column:span 2':''}">${b.label}</button>`;
  }).join('');

  a.innerHTML=`<div class="s-dg">
    <div class="dg-header"><button class="g-sm-btn" id="dg-menu">☰ Menu</button><span class="dg-title">⛳ Golf</span><span style="font-family:'Teko',sans-serif;font-size:clamp(16px,3vw,28px);color:var(--gold);font-weight:700">Hole ${holeNum}</span></div>
    <div class="dg-body">
      <div class="dg-players" style="min-height:clamp(60px,12vh,110px)">${pcards}</div>
      <div class="dg-info" style="padding:6px 12px">
        <div class="dg-info-main" style="font-size:clamp(28px,6vw,52px)">${cp.name} — Hole ${holeNum}</div>
        <div class="dg-info-sub" style="font-size:clamp(14px,2.5vw,22px)">Tap your best score from 3 darts</div>
      </div>
      <div class="dg-pad">
        <div class="dg-nums" style="grid-template-columns:1fr 1fr;max-height:none;flex:1">${scoreButtons}</div>
        <div class="dg-ctrl">
          ${curResult?`<button class="ctrl-btn hit" id="golf-take" style="background:${golfBtnColors[curResult].bg};border-color:${golfBtnColors[curResult].border};color:${golfBtnColors[curResult].color}">✅ Confirm ${gs.label}</button>`:'<button class="ctrl-btn" disabled style="opacity:.3">Select your best score</button>'}
        </div>
        <div style="padding:0 0 env(safe-area-inset-bottom)"><button class="ctrl-btn undo-c" id="dg-undo" style="width:100%">↩ UNDO</button></div>
      </div>
    </div>
  </div>`;

  document.getElementById('dg-menu').onclick=()=>showConfirm('End game?',()=>{S.screen='drinking';render();},'End Game');
  document.getElementById('dg-undo').onclick=dgUndo;

  // Select a result
  document.querySelectorAll('[data-gr]').forEach(b=>b.onclick=e=>{
    dgPushUndo();
    d.curResult=e.currentTarget.dataset.gr;
    renderDGPlay();
  });

  // Confirm score
  const takeBtn=document.getElementById('golf-take');
  if(takeBtn) takeBtn.onclick=()=>{
    const key=golfScoreKey(d.curResult);
    const val=GOLF_SCORES[key].val;
    playTap();
    dgPushUndo();
    d.scores[DS.cur]+=val;
    d.holeScores[DS.cur].push(val);
    d.curResult=null;
    DS.cur++;
    if(DS.cur>=ps.length){
      d.holeIdx++;
      DS.cur=0;
      d.phase='between';
    }
    renderDGPlay();
  };
}

function shNextPlayer(){
  DS.data.dartCount[DS.cur]=0;DS.data.misses=0;DS.mod=1;
  DS.cur++;
  if(DS.cur>=DS.players.length){DS.cur=0;DS.data.round++;}
  renderDGPlay();
}

// ── KILLER ──
function renderKiller(a){
  const d=DS.data,ps=DS.players;

  // Win condition
  const aliveIdxs=ps.map((_,i)=>i).filter(i=>d.lives[i]>0);
  if(aliveIdxs.length<=1){
    const win=aliveIdxs.length===1?ps[aliveIdxs[0]]:ps.reduce((a,b)=>d.lives[a.i||0]>d.lives[b.i||0]?a:b);
    const winName=aliveIdxs.length===1?ps[aliveIdxs[0]].name:'Last Standing';
    a.innerHTML=`<div class="s-dg">
      <div class="dg-header"><span class="dg-title">💀 Killer</span></div>
      <div class="dg-body" style="align-items:center;justify-content:center;gap:16px;text-align:center">
        <div style="font-size:64px">💀</div>
        <div style="font-family:'Teko',sans-serif;font-size:clamp(28px,6vw,48px);color:var(--red);letter-spacing:2px">LAST ONE STANDING</div>
        <div style="font-family:'Teko',sans-serif;font-size:clamp(40px,9vw,80px);font-weight:700;color:var(--gold)">${winName}</div>
        <div style="font-family:'Teko',sans-serif;font-size:clamp(20px,4vw,36px);color:var(--text)">WINS! 🏆</div>
        <div class="nav-row" style="width:100%;max-width:300px;margin-top:10px">
          <button class="btn sec" id="kl-again">Play Again</button>
          <button class="btn pri" id="kl-menu">🏠 Done</button>
        </div>
      </div>
    </div>`;
    document.getElementById('kl-menu').onclick=()=>{S.screen='drinking';render();};
    document.getElementById('kl-again').onclick=()=>{initDGame();DS.cur=0;renderDGPlay();};
    return;
  }

  // Skip out players
  while(d.lives[DS.cur]<=0) DS.cur=(DS.cur+1)%ps.length;
  const cp=ps[DS.cur];
  const isArmed=d.armed[DS.cur];
  const myNum=d.nums[DS.cur];
  const throwsLeft=3-d.armDarts[DS.cur];
  const targets=aliveIdxs.filter(i=>i!==DS.cur);

  // Flat player row — big hearts, name, number
  const pcards=ps.map((p,i)=>`<div class="dg-pcard ${i===DS.cur?'cur':''} ${d.lives[i]<=0?'done':''} ${d.armed[i]&&d.lives[i]>0?'killer':''}">
    <div class="dg-pname">${p.name}</div>
    <div style="font-family:'Teko',sans-serif;font-size:clamp(11px,2vw,16px);color:var(--muted);line-height:1">#${d.nums[i]}</div>
    <div class="dg-pval" style="font-size:clamp(28px,8vh,80px)">${d.lives[i]<=0?'💀':('❤️'.repeat(d.lives[i]))}</div>
    <div style="font-family:'Teko',sans-serif;font-size:clamp(11px,2vw,16px);color:${d.armed[i]&&d.lives[i]>0?'var(--red)':'var(--muted)'};line-height:1">${d.lives[i]<=0?'OUT 🍺':d.armed[i]?'💀 KILLER':''}</div>
  </div>`).join('');

  // Combined turn + status bar
  const statusColor=isArmed?'var(--red)':'var(--gold)';
  const statusLabel=isArmed?'💀 KILLER — choose your target!':('⚔️ Arm up — hit your number: '+myNum);
  const turnBanner=`<div style="font-family:'Teko',sans-serif;font-weight:700;text-align:center;padding:6px 8px;flex-shrink:0;background:var(--bg2);border-radius:8px;border:2px solid ${statusColor}">
    <div style="font-size:clamp(24px,5.5vw,52px);color:${statusColor};line-height:1">${cp.name}</div>
    <div style="font-size:clamp(13px,2.5vw,22px);color:${statusColor};opacity:.85;line-height:1.2">${statusLabel}</div>
  </div>`;

  let padHTML='', infoSub='';

  if(!isArmed){
    infoSub=`${throwsLeft} throw${throwsLeft!==1?'s':''} left · Triple = +1 life bonus!`;
    padHTML=`
      <div class="dg-nums" style="grid-template-columns:1fr 1fr;gap:8px">
        <button class="dg-num hit" id="kl-hit-own" style="font-size:clamp(28px,7vw,52px);font-weight:900;border-width:3px;flex-direction:column;gap:2px">
          <span style="font-size:.5em;opacity:.7">HIT</span>
          <span>${myNum}</span>
        </button>
        <button class="dg-num tpl" id="kl-hit-triple" style="font-size:clamp(28px,7vw,52px);font-weight:900;border-width:3px;flex-direction:column;gap:2px">
          <span style="font-size:.5em;opacity:.7">TRIPLE +❤️</span>
          <span>T${myNum}</span>
        </button>
      </div>
      <div class="dg-ctrl">
        <button class="ctrl-btn miss-c" id="kl-miss">MISS (${throwsLeft} left)</button>
      </div>`;
  } else {
    infoSub=`${throwsLeft} throw${throwsLeft!==1?'s':''} left · miss all 3 = lose armed`;
    const cols=Math.min(targets.length,3);
    const oppBtns=targets.map(i=>`<button class="dg-num hit" data-victim="${i}" style="font-size:clamp(16px,3.5vw,28px);font-weight:900;flex-direction:column;gap:3px;border-width:2px">
      <span style="font-size:.75em;opacity:.8">${ps[i].name}</span>
      <span style="font-size:1.2em">${d.nums[i]}</span>
      <span>${'❤️'.repeat(d.lives[i])}</span>
    </button>`).join('');
    padHTML=`
      <div class="dg-nums" style="grid-template-columns:repeat(${cols},1fr);gap:8px">${oppBtns}</div>
      <div class="dg-ctrl">
        <button class="ctrl-btn miss-c" id="kl-miss">MISS (${throwsLeft} left)</button>
      </div>`;
  }

  a.innerHTML=`<div class="s-dg">
    <div class="dg-header"><button class="g-sm-btn" id="dg-menu">☰ Menu</button><span class="dg-title">💀 KILLER</span></div>
    <div class="dg-body">
      <div class="dg-players">${pcards}</div>
      ${turnBanner}
      <div class="dg-info"><div class="dg-info-sub">${infoSub}</div></div>
      <div class="dg-pad">${padHTML}</div>
    </div>
  </div>`;

  document.getElementById('dg-menu').onclick=()=>showConfirm('End game?',()=>{S.screen='drinking';render();},'End Game');
  document.querySelectorAll('#dg-undo').forEach(b=>b.onclick=dgUndo);

  if(!isArmed){
    document.getElementById('kl-hit-own').onclick=()=>{
      playTap();dgPushUndo();d.armDarts[DS.cur]=0;
      d.armed[DS.cur]=true;
      showToast(cp.name+' ARMED! 💀\nAttack next turn!',true);
      setTimeout(()=>{advDG();renderDGPlay();},1800);
    };
    document.getElementById('kl-hit-triple').onclick=()=>{
      playTap();dgPushUndo();// Triple hit = armed + bonus life!
      d.armDarts[DS.cur]=0;
      d.armed[DS.cur]=true;
      d.lives[DS.cur]++;
      showToast(cp.name+' TRIPLE! 💀\nARMED + Bonus ❤️!',true);
      setTimeout(()=>{advDG();renderDGPlay();},2000);
    };
    document.getElementById('kl-miss').onclick=()=>{
      playMiss();d.armDarts[DS.cur]++;
      if(d.armDarts[DS.cur]>=3){
        d.armDarts[DS.cur]=0;
        advDG();renderDGPlay();
      } else {
        renderDGPlay();
      }
    };
  } else {
    document.querySelectorAll('[data-victim]').forEach(b=>b.onclick=e=>{
      const victimIdx=+e.currentTarget.dataset.victim;
      playTap();dgPushUndo();d.armDarts[DS.cur]=0;
      d.lives[victimIdx]--;
      if(d.lives[victimIdx]<=0){
        d.lives[victimIdx]=0;
        showDrinkAlert(ps[victimIdx].name+' is OUT! 💀','Finish your drink! 🍺',()=>{advDG();renderDGPlay();});
      } else {
        showToast(ps[victimIdx].name+' loses a life!\n'+('❤️'.repeat(d.lives[victimIdx])),true);
        setTimeout(()=>{advDG();renderDGPlay();},1800);
      }
    });
    document.getElementById('kl-miss').onclick=()=>{
      d.armDarts[DS.cur]++;
      if(d.armDarts[DS.cur]>=3){
        d.armDarts[DS.cur]=0;
        d.armed[DS.cur]=false;
        showToast('Missed all 3!\nLost armed status 😬',true);
        setTimeout(()=>{advDG();renderDGPlay();},1600);
      } else {
        renderDGPlay();
      }
    };
  }
}

function advDG(){
  DS.cur=(DS.cur+1)%DS.players.length;
  if(DS.game==='atw') DS.data.throwsUsed=0;
}

function runBotDGTurn(){
  const p=DS.players[DS.cur];
  if(!p||!p.isBot) return;
  const level=p.botLevel||'rookie';
  const cfg=DARTBOT_LEVELS[level];
  const d=DS.data;

  if(DS.game==='atw'){
    const myProg=d.progress[DS.cur];
    const myTgt=d.targets[myProg];
    // Simulate 3 throws
    let hit=false;
    for(let i=0;i<3;i++){
      const r=botThrow(myTgt==='bull'?'bull':myTgt,1,level);
      if(r.num===myTgt||(myTgt==='bull'&&r.num==='bull')){hit=true;break;}
    }
    if(hit){
      playTap();
      d.progress[DS.cur]++;
      if(d.progress[DS.cur]>=d.targets.length){
        d.done[DS.cur]=true;
        showDrinkAlert('🎯 R2Dart2 hit Bull! 🏆','Everyone else — finish your drink!',()=>{advDG();renderDGPlay();});
        return;
      }
      showToast('🎯 R2Dart2 hit '+(myTgt==='bull'?'Bull':myTgt)+'!',false);
      setTimeout(()=>{advDG();renderDGPlay();},1200);
    } else {
      playMiss();
      showDrinkAlert('🎯 R2Dart2 missed all three and drank 🍺','',()=>{advDG();renderDGPlay();});
    }
  } else if(DS.game==='highball'){
    // Simulate 3 darts, score them
    let score=0;
    for(let i=0;i<3;i++){
      const tgt=[20,19,18,17,16,15,14,13][Math.floor(Math.random()*8)];
      const r=botThrow(tgt,Math.random()<cfg.tplMult?3:Math.random()<cfg.dblMult?2:1,level);
      if(r.num>0) score+=r.scored||r.num;
    }
    d.scores[DS.cur]=score;
    d.darts[DS.cur]=3;
    showToast('🎯 R2Dart2 scored '+score+'pts',false);
    setTimeout(()=>{
      DS.cur++;
      if(DS.cur>=DS.players.length){DS.data.showResults=true;}
      renderDGPlay();
    },1000);
    return;
  } else if(DS.game==='shanghai'){
    const tgt=d.rounds[d.round];
    const isBull=tgt==='bull';
    let pts=0;
    let missed=0;
    for(let i=0;i<3;i++){
      const r=botThrow(tgt,Math.random()<cfg.tplMult?3:Math.random()<cfg.dblMult?2:1,level);
      if(r.num===tgt||(isBull&&r.num==='bull')){
        const val=isBull?(r.mult===2?100:50):(typeof r.num==='number'?r.num*r.mult:0);
        pts+=val;
      } else {
        missed++;
      }
    }
    d.pts[DS.cur]+=pts;
    if(missed>=3){
      playMiss();
      showDrinkAlert('🎯 R2Dart2 missed all 3!','R2Dart2 drinks! 🍺',()=>{d.misses=0;shNextPlayer();renderDGPlay();});
      return;
    }
    showToast('🎯 R2Dart2 scored '+pts+'pts',false);
    setTimeout(()=>{shNextPlayer();renderDGPlay();},1000);
    return;
  } else if(DS.game==='golf'){
    const d=DS.data;
    const holeNum=d.holes[d.holeIdx];
    const key=botGolfTurn(p,holeNum,level);
    const val=GOLF_SCORES[key].val;
    const gs=GOLF_SCORES[key];
    playTap();
    d.scores[DS.cur]+=val;
    d.holeScores[DS.cur].push(val);
    d.curResult=null;d.curDart=0;
    showToast('🤖 R2Dart2: '+gs.emoji+' '+gs.label+' ('+(val>0?'+':'')+val+')',false,gs.color);
    setTimeout(()=>{
      DS.cur++;
      if(DS.cur>=DS.players.length){
        d.holeIdx++;DS.cur=0;d.phase='between';
      }
      renderDGPlay();
    },1200);
    return;
  }
}

// Load saved theme
if(localStorage.getItem('gdarts-theme')==='light') document.body.classList.add('light');
if(localStorage.getItem('gdarts-sound')==='0') S.soundOn=false;

render();
</script>
